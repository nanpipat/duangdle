<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Siamsi - 100% Pure SVG Art (Fat Sticks)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Noto+Sans+Thai:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Itim', 'Noto Sans Thai', sans-serif;
            background-color: #FBF6EB;
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-4 select-none">

    <div class="relative w-full max-w-md h-[844px] bg-[#FBF6EB] overflow-hidden flex flex-col justify-between p-6">
        
        <div class="w-full flex justify-between items-center pt-2 z-10">
            <button class="w-11 h-11 rounded-full bg-[#FFFBF5] border border-[#EFE5D3] flex justify-center items-center text-[#8C6239] shadow-[0_2px_4px_rgba(226,203,178,0.15)] active:scale-95 transition">
                <svg class="w-5 h-5 text-[#8C6239]/80" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M13.5 4.06c0-.75-.74-1.23-1.42-.87l-4.66 2.51H5.25A2.25 2.25 0 003 7.95v8.1c0 1.24 1.01 2.25 2.25 2.25h2.17l4.66 2.51c.68.36 1.42-.12 1.42-.87V4.06zM17.78 9.22a.75.75 0 10-1.06 1.06L18.44 12l-1.72 1.72a.75.75 0 001.06 1.06l1.72-1.72 1.72 1.72a.75.75 0 101.06-1.06L20.56 12l1.72-1.72a.75.75 0 00-1.06-1.06l-1.72 1.72-1.72-1.72z"/>
                </svg>
            </button>
            
            <button class="flex flex-col items-center justify-center w-14 h-14 rounded-2xl bg-[#FFFBF5] border border-[#EFE5D3] text-[#714B27] shadow-[0_2px_4px_rgba(226,203,178,0.15)] active:scale-95 transition">
                <svg class="w-5 h-5 text-[#8C6239]/80 mb-0.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
                </svg>
                <span class="text-[10px] font-bold tracking-tight">ประวัติ</span>
            </button>
        </div>

        <div class="text-center flex flex-col items-center z-10 -mt-2">
            <div class="flex items-center space-x-3 mb-2 opacity-30">
                <div class="w-6 h-[1.5px] bg-[#714B27]"></div>
                <span class="text-xs text-[#714B27]">🌸</span>
                <div class="w-6 h-[1.5px] bg-[#714B27]"></div>
            </div>
            <h1 class="text-[31px] text-[#5C3A21] leading-[1.35] font-normal tracking-wide">
                วันนี้ ลองฟัง<br>เสียงในใจดูไหม
            </h1>
            <p class="text-sm text-[#8C624E] mt-2 font-light tracking-wide opacity-80">
                เขย่าเซียมซีเพื่อรับดวงประจำวัน
            </p>
        </div>

        <div class="relative w-full flex-grow flex items-center justify-center">
            
            <svg viewBox="0 0 400 460" class="w-[340px] h-[390px]" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <style>
                        .main-outline { stroke: #5C3A21; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
                        .thin-outline { stroke: #5C3A21; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
                        .inner-wood { stroke: #E6CBB2; stroke-width: 2.5; stroke-linecap: round; }
                        .cn-text { font-family: 'Courier New', sans-serif; font-weight: 900; fill: #CC5A46; font-size: 16px; }
                    </style>
                    <linearGradient id="bucket-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#F7DCAE" />
                        <stop offset="15%" stop-color="#FCE2B6" />
                        <stop offset="85%" stop-color="#FCE2B6" />
                        <stop offset="100%" stop-color="#EAC998" />
                    </linearGradient>
                    <linearGradient id="stick-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#E27B66" />
                        <stop offset="100%" stop-color="#D36B58" />
                    </linearGradient>
                </defs>

                <path d="M 40 160 C 35 150, 45 140, 55 145 C 50 155, 45 165, 40 160 Z" fill="#9FB892" class="thin-outline" transform="rotate(-15 45 150)"/>
                <path d="M 40 160 L 52 147" stroke="#5C3A21" stroke-width="1.5"/>
                
                <g transform="translate(340, 180) scale(0.8)">
                    <circle cx="0" cy="0" r="6" fill="#F3A39E" class="thin-outline"/>
                    <circle cx="-10" cy="0" r="5" fill="#F5B5B1" class="thin-outline"/>
                    <circle cx="10" cy="0" r="5" fill="#F5B5B1" class="thin-outline"/>
                    <circle cx="0" cy="-10" r="5" fill="#F5B5B1" class="thin-outline"/>
                    <circle cx="0" cy="10" r="5" fill="#F5B5B1" class="thin-outline"/>
                </g>
                <g transform="translate(70, 370) scale(0.7)">
                    <circle cx="0" cy="0" r="6" fill="#F3A39E" class="thin-outline"/>
                    <circle cx="-10" cy="0" r="5" fill="#F5B5B1" class="thin-outline"/>
                    <circle cx="10" cy="0" r="5" fill="#F5B5B1" class="thin-outline"/>
                    <circle cx="0" cy="-10" r="5" fill="#F5B5B1" class="thin-outline"/>
                    <circle cx="0" cy="10" r="5" fill="#F5B5B1" class="thin-outline"/>
                </g>

                <ellipse cx="200" cy="415" rx="90" ry="14" fill="#EADCC9" />

                <g id="all-sticks">
                    <g transform="translate(120, 130) rotate(-14)">
                        <path d="M -28 -20 C -28 -42, 28 -42, 28 -20 L 22 130 L -22 130 Z" fill="#F4E3D3" class="main-outline"/>
                        <path d="M -23 -18 C -23 -34, 23 -34, 23 -18 L 18 126 L -18 126 Z" fill="url(#stick-grad)"/>
                        <rect x="-13" y="-6" width="26" height="70" rx="10" fill="#FCE2B6" class="thin-outline"/>
                        <circle cx="0" cy="5" r="11" fill="#FFFBF5" class="thin-outline"/>
                        <text x="0" y="11" text-anchor="middle" class="cn-text">上</text>
                        <circle cx="0" cy="33" r="11" fill="#FFFBF5" class="thin-outline"/>
                        <text x="0" y="39" text-anchor="middle" class="cn-text">上</text>
                    </g>

                    <g transform="translate(158, 105) rotate(-5)">
                        <path d="M -28 -20 C -28 -42, 28 -42, 28 -20 L 22 140 L -22 140 Z" fill="#F4E3D3" class="main-outline"/>
                        <path d="M -23 -18 C -23 -34, 23 -34, 23 -18 L 18 136 L -18 136 Z" fill="url(#stick-grad)"/>
                        <rect x="-13" y="-8" width="26" height="55" rx="10" fill="#FCE2B6" class="thin-outline"/>
                        <circle cx="0" cy="3" r="11" fill="#FFFBF5" class="thin-outline"/>
                        <text x="0" y="9" text-anchor="middle" class="cn-text">上</text>
                        <circle cx="0" cy="30" r="11" fill="#FFFBF5" class="thin-outline"/>
                        <text x="0" y="36" text-anchor="middle" class="cn-text">上</text>
                    </g>

                    <g transform="translate(200, 95) rotate(0)">
                        <path d="M -32 -20 C -32 -44, 32 -44, 32 -20 L 25 140 L -25 140 Z" fill="#F4E3D3" class="main-outline"/>
                        <path d="M -27 -18 C -27 -36, 27 -36, 27 -18 L 21 136 L -21 136 Z" fill="url(#stick-grad)"/>
                        <rect x="-15" y="-8" width="30" height="85" rx="12" fill="#FCE2B6" class="thin-outline"/>
                        <circle cx="0" cy="5" r="12" fill="#FFFBF5" class="thin-outline"/>
                        <text x="0" y="12" text-anchor="middle" class="cn-text" font-size="18">上</text>
                        <circle cx="0" cy="35" r="12" fill="#FFFBF5" class="thin-outline"/>
                        <text x="0" y="42" text-anchor="middle" class="cn-text" font-size="18">上</text>
                        <text x="0" y="66" text-anchor="middle" fill="#FFFBF5" font-size="14" font-weight="bold">签</text>
                    </g>

                    <g transform="translate(242, 105) rotate(6)">
                        <path d="M -28 -20 C -28 -42, 28 -42, 28 -20 L 22 140 L -22 140 Z" fill="#F4E3D3" class="main-outline"/>
                        <path d="M -23 -18 C -23 -34, 23 -34, 23 -18 L 18 136 L -18 136 Z" fill="url(#stick-grad)"/>
                        <rect x="-13" y="-8" width="26" height="60" rx="10" fill="#FCE2B6" class="thin-outline"/>
                        <circle cx="0" cy="3" r="11" fill="#FFFBF5" class="thin-outline"/>
                        <text x="0" y="9" text-anchor="middle" class="cn-text">上</text>
                        <circle cx="0" cy="30" r="11" fill="#FFFBF5" class="thin-outline"/>
                        <text x="0" y="36" text-anchor="middle" class="cn-text">上</text>
                    </g>

                    <g transform="translate(280, 130) rotate(15)">
                        <path d="M -28 -20 C -28 -42, 28 -42, 28 -20 L 22 130 L -22 130 Z" fill="#F4E3D3" class="main-outline"/>
                        <path d="M -23 -18 C -23 -34, 23 -34, 23 -18 L 18 126 L -18 126 Z" fill="url(#stick-grad)"/>
                        <rect x="-13" y="-6" width="26" height="70" rx="10" fill="#FCE2B6" class="thin-outline"/>
                        <circle cx="0" cy="5" r="11" fill="#FFFBF5" class="thin-outline"/>
                        <text x="0" y="11" text-anchor="middle" class="cn-text">上</text>
                        <circle cx="0" cy="33" r="11" fill="#FFFBF5" class="thin-outline"/>
                        <text x="0" y="39" text-anchor="middle" class="cn-text">上</text>
                    </g>
                </g>

                <g id="main-bucket">
                    <path d="M 112 230 L 288 230 C 298 230, 292 240, 286 290 L 272 390 C 270 405, 255 408, 200 408 C 145 408, 130 405, 128 390 L 114 290 C 108 240, 102 230, 112 230 Z" fill="url(#bucket-grad)" class="main-outline"/>
                    
                    <path d="M 148 231 C 150 290, 153 350, 156 406" class="inner-wood"/>
                    <path d="M 200 232 L 200 408" stroke="#E6CBB2" stroke-width="3.5" stroke-linecap="round"/>
                    <path d="M 252 231 C 250 290, 247 350, 244 406" class="inner-wood"/>

                    <path d="M 107 232 C 107 226, 293 226, 293 232 L 290 242 C 290 237, 110 237, 110 242 Z" fill="#EAC998" class="main-outline"/>

                    <circle cx="200" cy="315" r="42" fill="#CC5A46" class="main-outline"/>
                    <circle cx="200" cy="315" r="37" fill="none" stroke="#EAC998" stroke-width="1.5"/>
                    <text x="200" y="331" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="900" font-size="46">签</text>
                </g>

                <g id="ribbon-and-clouds">
                    <path d="M 270 355 C 315 345, 330 380, 295 405 C 280 415, 265 395, 275 380" fill="#CC5A46" class="main-outline" />
                    <path d="M 290 392 C 282 385, 305 370, 312 385 C 322 385, 318 398, 302 397 Z" fill="#FFF5E4" class="thin-outline"/>

                    <path d="M 111 346 C 160 382, 240 375, 292 334 L 285 366 C 230 412, 160 412, 112 376 Z" fill="#CC5A46" class="main-outline"/>
                    
                    <g transform="translate(112, 345)">
                        <path d="M -5 20 C -25 22, -32 2, -12 -5 C -15 -25, 12 -22, 16 -8 C 32 -10, 35 15, 15 22 C 10 22, 0 25, -5 20 Z" fill="#FFF5E4" class="main-outline" />
                        <path d="M -2 10 C -8 7, -3 0, 3 4 C 7 10, 0 16, -6 11 C -2 8, 0 7, 1 6" fill="none" stroke="#5C3A21" stroke-width="2" stroke-linecap="round"/>
                    </g>
                </g>
            </svg>

        </div>

        <div class="w-full pb-4 px-2 z-10">
            <button class="w-full bg-[#FFF8EE] hover:bg-[#FDF2E2] border-2 border-[#EFE3D0] rounded-full py-4 px-6 flex items-center justify-between shadow-[0_6px_16px_rgba(234,220,201,0.4)] active:scale-[0.99] transition-all">
                
                <div class="flex items-center space-x-4">
                    <svg class="w-6 h-6 text-[#8C6239]/80" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.182 15.182a4.5 4.5 0 01-6.364 0M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <div class="text-left">
                        <p class="text-base font-medium text-[#5C3A21] tracking-wide">เขย่าเซียมซี</p>
                        <p class="text-[11px] text-[#A6866D] font-light mt-0.5">หรือ ลากกระบอกเพื่อเขย่า</p>
                    </div>
                </div>

                <div class="text-[#CC5A46] font-bold text-sm tracking-widest pr-1">
                    ❯❯
                </div>
            </button>
        </div>

    </div>

</body>
</html>
